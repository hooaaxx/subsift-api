name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.testing .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test

  deploy:
    name: Deploy
    needs: ci
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        run: |
          set -e
          git -C /var/www/subsift-api pull origin main
          composer -d /var/www/subsift-api install --no-dev --optimize-autoloader
          php /var/www/subsift-api/artisan migrate --force
          php /var/www/subsift-api/artisan optimize:clear
          sudo systemctl reload php8.3-fpm
